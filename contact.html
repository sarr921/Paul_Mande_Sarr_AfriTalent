<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AfriTalent</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<main class="container py-5">

    <!-- Titre -->
    <section class="text-center mb-5">
        <h1>Contactez-nous</h1>
        <p>
            Une question, un projet ou une suggestion ?
            N'hésitez pas à nous contacter.
        </p>
    </section>

    <div class="row g-4">

        <!-- Formulaire -->
        <div class="col-lg-7">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="mb-4">Formulaire de Contact</h2>

                    <form id="contactForm">

                        <!-- Nom -->
                        <div class="mb-3">
                            <label for="nom" class="form-label">Nom</label>
                            <input
                                type="text"
                                class="form-control"
                                id="nom"
                                name="nom"
                                required
                            >
                            <small id="nomError" class="text-danger"></small>
                        </div>

                        <!-- Prénom -->
                        <div class="mb-3">
                            <label for="prenom" class="form-label">Prénom</label>
                            <input
                                type="text"
                                class="form-control"
                                id="prenom"
                                name="prenom"
                                required
                            >
                            <small id="prenomError" class="text-danger"></small>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                name="email"
                                required
                            >
                            <small id="emailError" class="text-danger"></small>
                        </div>

                        <!-- Sujet -->
                        <div class="mb-3">
                            <label for="sujet" class="form-label">Sujet</label>

                            <select
                                class="form-select"
                                id="sujet"
                                name="sujet"
                                required
                            >
                                <option value="">Choisissez un sujet</option>
                                <option>Demande d'information</option>
                                <option>Recrutement</option>
                                <option>Support technique</option>
                                <option>Partenariat</option>
                                <option>Autre</option>
                            </select>

                            <small id="sujetError" class="text-danger"></small>
                        </div>

                        <!-- Message -->
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>

                            <textarea
                                class="form-control"
                                id="message"
                                name="message"
                                rows="6"
                                required
                            ></textarea>

                            <small id="messageError" class="text-danger"></small>
                        </div>

                        <!-- Message succès JS -->
                        <div id="successMessage"></div>

                        <!-- Bouton -->
                        <button type="submit" class="btn btn-primary">
                            Envoyer le message
                        </button>

                    </form>

                </div>
            </div>

        </div>

        <!-- Informations de contact -->
        <div class="col-lg-5">

            <div class="card shadow-sm mb-4">
                <div class="card-body">

                    <h2 class="mb-4">Nos Coordonnées</h2>

                    <p>
                        <i class="bi bi-envelope-fill"></i>
                        contact@afritalent.com
                    </p>

                    <p>
                        <i class="bi bi-telephone-fill"></i>
                        +221 76 433 75 37
                    </p>

                    <p>
                        <i class="bi bi-geo-alt-fill"></i>
                        Dakar Plateau, Sénégal
                    </p>

                </div>
            </div>

            <!-- Carte Google Maps -->
            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="mb-3">Notre Localisation</h2>

                    <iframe
                        src="https://maps.google.com/maps?q=Dakar&t=&z=13&ie=UTF8&iwloc=&output=embed"
                        width="100%"
                        height="300"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy">
                    </iframe>

                </div>
            </div>

        </div>

    </div>

</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
